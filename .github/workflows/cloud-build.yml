name: Build Info

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  info:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 📝 Generate build info
      run: |
        echo "==================================" > build-info.txt
        echo "懒人记账 - 构建信息" >> build-info.txt
        echo "==================================" >> build-info.txt
        echo "" >> build-info.txt
        echo "构建时间: $(date)" >> build-info.txt
        echo "提交哈希: ${{ github.sha }}" >> build-info.txt
        echo "分支: ${{ github.ref_name }}" >> build-info.txt
        echo "触发者: ${{ github.actor }}" >> build-info.txt
        echo "" >> build-info.txt
        echo "==================================" >> build-info.txt
        echo "打包说明" >> build-info.txt
        echo "==================================" >> build-info.txt
        echo "" >> build-info.txt
        echo "请使用 HBuilderX 进行云打包：" >> build-info.txt
        echo "1. 下载 HBuilderX" >> build-info.txt
        echo "2. 打开项目" >> build-info.txt
        echo "3. 发行 → 原生 App-云打包" >> build-info.txt
        echo "" >> build-info.txt
        cat build-info.txt

    - name: 📤 Upload build info
      uses: actions/upload-artifact@v4
      with:
        name: build-info
        path: build-info.txt
