name: Check Build Config

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: 🔧 Install dependencies
      run: npm install

    - name: ✅ Verify Secrets
      run: |
        echo "==================================="
        echo "GitHub Secrets 配置检查"
        echo "==================================="
        echo ""
        if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          echo "✅ KEYSTORE_BASE64: 已配置"
        else
          echo "❌ KEYSTORE_BASE64: 未配置"
        fi

        if [ -n "${{ secrets.KEYSTORE_PASSWORD }}" ]; then
          echo "✅ KEYSTORE_PASSWORD: 已配置"
        else
          echo "❌ KEYSTORE_PASSWORD: 未配置"
        fi

        if [ -n "${{ secrets.KEY_PASSWORD }}" ]; then
          echo "✅ KEY_PASSWORD: 已配置"
        else
          echo "❌ KEY_PASSWORD: 未配置"
        fi

        if [ -n "${{ secrets.KEY_ALIAS }}" ]; then
          echo "✅ KEY_ALIAS: 已配置"
        else
          echo "❌ KEY_ALIAS: 未配置"
        fi
        echo ""
        echo "==================================="
        echo "uni-app 打包说明"
        echo "==================================="
        echo ""
        echo "⚠️  uni-app 无法在 GitHub Actions 中直接打包原生 APK"
        echo ""
        echo "推荐打包方式："
        echo "1. 使用 HBuilderX 云打包（最简单）"
        echo "2. 使用 DCloud 开放平台 API（企业账号）"
        echo ""
        echo "快速打包步骤："
        echo "1. 下载 HBuilderX: https://www.dcloud.io/hbuilderx.html"
        echo "2. 打开项目: lazy-money"
        echo "3. 菜单: 发行 → 原生 App-云打包"
        echo "4. 配置证书信息"
        echo "5. 等待打包完成"
        echo ""
        echo "证书配置："
        echo "- 证书别名: lazy-money"
        echo "- 密码: android123"
        echo ""
        echo "==================================="

    - name: 📝 Project Info
      run: |
        echo "项目信息:"
        echo "- 名称: 懒人记账"
        echo "- 框架: uni-app"
        echo "- 版本: $(node -p "require('./package.json').version")"
        echo "- 仓库: https://github.com/iwenke/lazy-money"
