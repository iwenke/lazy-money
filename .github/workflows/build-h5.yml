name: Build H5

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: 🔧 Install dependencies
      run: npm install

    - name: 🔨 Build H5
      run: npm run build:h5

    - name: 📤 Upload H5 build
      uses: actions/upload-artifact@v4
      with:
        name: h5-dist
        path: unpackage/dist/build/h5/

    - name: 🌐 Deploy to GitHub Pages (Optional)
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./unpackage/dist/build/h5
        cname: lazy-money.example.com  # 可选：自定义域名
